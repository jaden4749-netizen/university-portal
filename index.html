<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 500px;">
        
        <div id="login-section" class="card shadow mb-4">
            <div class="card-body">
                <h3>Student Login</h3>
                <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
            </div>
        </div>

        <div id="reg-section" class="card shadow d-none">
            <div class="card-body">
                <h3 class="text-success">Welcome!</h3>
                <p>Register for a class below:</p>
                <input type="number" id="stuID" class="form-control mb-2" placeholder="Student ID (Internal)">
                <input type="number" id="courseID" class="form-control mb-2" placeholder="Course ID">
                <input type="text" id="courseName" class="form-control mb-2" placeholder="Course Name">
                <button onclick="handleRegistration()" class="btn btn-success w-100">Register Now</button>
                <button onclick="handleLogout()" class="btn btn-link w-100 mt-2">Logout</button>
            </div>
        </div>

        <div id="status" class="mt-3 alert d-none"></div>
    </div>

    <script>
    // 1. Setup the "Messenger" (Supabase Client)
    // IMPORTANT: Make sure your URL and Key are inside the 'quotes'
    const supabaseUrl = 'https://twghktazmkticvfggaec.supabase.co';
    const supabaseKey = 'sb_secret_JgpronS2rNUyWpXQPC-GPQ_Udh5OroC';
    
    // This is the specific way to initialize when using the CDN link
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. The Login Function
    async function handleLogin() {
        console.log("Attempting login..."); // This will show in your console
        
        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;

        // Try to sign in
        const { data, error } = await _supabase.auth.signInWithPassword({
            email: emailInput,
            password: passwordInput
        });

        const statusDiv = document.getElementById('status');
        statusDiv.classList.remove('d-none');

        if (error) {
            console.error("Login Error:", error.message);
            statusDiv.innerText = "Login Failed: " + error.message;
            statusDiv.className = "mt-3 alert alert-danger";
        } else {
            console.log("Login Success!", data);
            statusDiv.innerText = "Login Success! Welcome.";
            statusDiv.className = "mt-3 alert alert-success";
            
            // Swap the GUI screens
            document.getElementById('login-section').classList.add('d-none');
            document.getElementById('reg-section').classList.remove('d-none');
        }
    }

    // 3. The Registration Function
    async function handleRegistration() {
        const sID = document.getElementById('stuID').value;
        const cID = document.getElementById('courseID').value;
        const cName = document.getElementById('courseName').value;

        const { error } = await _supabase.from('class').insert([{ 
            classid: Math.floor(Math.random() * 100000),
            cl_date: '2026-09-01', 
            cl_time: 10,
            courseid: cID,
            crs_name: cName,
            professorid: 1,
            studentid: sID
        }]);
        
        const statusDiv = document.getElementById('status');
        if (error) {
            statusDiv.innerText = "Registration Error: " + error.message;
            statusDiv.className = "mt-3 alert alert-danger";
        } else {
            statusDiv.innerText = "Success! Enrollment completed.";
            statusDiv.className = "mt-3 alert alert-success";
        }
    }
</script>
        
</body>
</html>
