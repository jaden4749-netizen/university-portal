<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 500px;">
        
        <div id="login-section" class="card shadow mb-4">
            <div class="card-body">
                <h3>Student Login</h3>
                <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
            </div>
        </div>

        <div id="reg-section" class="card shadow d-none">
            <div class="card-body">
                <h3 class="text-success">Welcome!</h3>
                <p>Register for a class below:</p>
                <input type="number" id="stuID" class="form-control mb-2" placeholder="Student ID (Internal)">
                <input type="number" id="courseID" class="form-control mb-2" placeholder="Course ID">
                <input type="text" id="courseName" class="form-control mb-2" placeholder="Course Name">
                <button onclick="handleRegistration()" class="btn btn-success w-100">Register Now</button>
                <button onclick="handleLogout()" class="btn btn-link w-100 mt-2">Logout</button>
            </div>
        </div>

        <div id="status" class="mt-3 alert d-none"></div>
    </div>

    <script>
        // FILL IN YOUR KEYS HERE
        const supabase = supabase.createClient(https://twghktazmkticvfggaec.supabase.co, sb_publishable_BXu3T08wg8mrr4jBc5vZDg_m9rwv2Fk);

        // --- LOGIN FUNCTION ---
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                showStatus(error.message, "danger");
            } else {
                showStatus("Logged in successfully!", "success");
                document.getElementById('login-section').classList.add('d-none');
                document.getElementById('reg-section').classList.remove('d-none');
            }
        }

        // --- REGISTRATION FUNCTION ---
        async function handleRegistration() {
            const { error } = await supabase.from('class').insert([{ 
                classid: Math.floor(Math.random() * 100000),
                cl_date: '2026-09-01', cl_time: 10,
                courseid: document.getElementById('courseID').value,
                crs_name: document.getElementById('courseName').value,
                professorid: 1,
                studentid: document.getElementById('stuID').value
            }]);
            
            if (error) {
                showStatus("Registration Failed: " + error.message, "danger");
            } else {
                showStatus("Success! You are enrolled.", "success");
            }
        }

        function handleLogout() {
            supabase.auth.signOut();
            location.reload();
        }

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.className = `mt-3 alert alert-${type}`;
            s.innerText = msg;
            s.classList.remove('d-none');
        }
    </script>
</body>
</html>
