<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light p-5">
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h3 class="card-title">University GUI</h3>
            <input type="number" id="stuID" class="form-control mb-2" placeholder="Student ID">
            <input type="number" id="courseID" class="form-control mb-2" placeholder="Course ID">
            <input type="text" id="courseName" class="form-control mb-2" placeholder="Course Name">
            <button onclick="handleRegistration()" class="btn btn-primary w-100">Register</button>
            <div id="status" class="mt-3"></div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        async function handleRegistration() {
            const { error } = await supabase.from('class').insert([{ 
                classid: Math.floor(Math.random() * 10000),
                cl_date: '2026-09-01', cl_time: 10,
                courseid: document.getElementById('courseID').value,
                crs_name: document.getElementById('courseName').value,
                professorid: 1,
                studentid: document.getElementById('stuID').value
            }]);
            
            const s = document.getElementById('status');
            s.innerText = error ? "Error: " + error.message : "Success!";
            s.style.color = error ? "red" : "green";
        }
    </script>
</body>
</html>
